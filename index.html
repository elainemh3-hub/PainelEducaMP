<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PainelEducaMP — CAOPIJE/MPTO</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; font-family: 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    select:focus, input:focus { border-color: #22d3ee !important; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ── Data ──────────────────────────────────────────────────────────────────
    const COMARCAS = {
      "Palmas": ["Palmas", "Aparecida do Rio Negro", "Lajeado", "Miracema do Tocantins", "Tocantínia"],
      "Araguaína": ["Araguaína", "Babaçulândia", "Filadélfia", "Wanderlândia", "Nova Olinda"],
      "Gurupi": ["Gurupi", "Aliança do Tocantins", "Dueré", "Figueirópolis", "Peixe"],
      "Paraíso do Tocantins": ["Paraíso do Tocantins", "Pugmil", "Barrolândia", "Monte Santo do Tocantins", "Chapada de Areia"],
      "Porto Nacional": ["Porto Nacional", "Brejinho de Nazaré", "Fátima", "Monte do Carmo", "Silvanópolis"],
      "Colinas do Tocantins": ["Colinas do Tocantins", "Bandeirantes do Tocantins", "Presidente Kennedy", "Brasilândia do Tocantins", "Palmeirante"],
      "Dianópolis": ["Dianópolis", "Almas", "Conceição do Tocantins", "Natividade", "Porto Alegre do Tocantins"],
      "Tocantinópolis": ["Tocantinópolis", "Aguiarnópolis", "Itaguatins", "Maurilândia do Tocantins", "Nazaré"],
    };

    const CATEGORIAS = [
      { id: "infraestrutura", label: "Infraestrutura", icon: "\u{1F3D7}\u{FE0F}", color: "#0ea5e9" },
      { id: "sala_aee", label: "Sala de AEE", icon: "\u267F", color: "#8b5cf6" },
      { id: "equipe_multi", label: "Equipe Multidisciplinar", icon: "\u{1F465}", color: "#10b981" },
      { id: "riga", label: "RIGA", fullLabel: "Rede Interinstitucional de Garantia da Aprendizagem", icon: "\u{1F4CB}", color: "#f59e0b" },
      { id: "indicadores", label: "Indicadores Educacionais", icon: "\u{1F4CA}", color: "#ef4444" },
    ];

    const BASE_LEGAL = {
      infraestrutura: {
        titulo: "Base Legal \u2013 Infraestrutura Escolar",
        normas: [
          "CF/88, Art. 206, VII \u2013 Garantia de padr\u00e3o de qualidade",
          "LDB 9.394/96, Art. 4\u00ba, IX \u2013 Padr\u00f5es m\u00ednimos de qualidade",
          "PNE \u2013 Lei 13.005/2014, Meta 7, Estrat\u00e9gia 7.18",
          "Resolu\u00e7\u00e3o CNE/CEB n\u00ba 4/2010 \u2013 Diretrizes Gerais da Ed. B\u00e1sica",
          "Parecer CNE/CEB n\u00ba 8/2010 \u2013 Padr\u00f5es de qualidade",
        ],
      },
      sala_aee: {
        titulo: "Base Legal \u2013 Atendimento Educacional Especializado",
        normas: [
          "CF/88, Art. 208, III \u2013 Atendimento especializado",
          "LDB 9.394/96, Art. 58-60 \u2013 Educa\u00e7\u00e3o Especial",
          "Decreto 7.611/2011 \u2013 Educa\u00e7\u00e3o Especial e AEE",
          "Resolu\u00e7\u00e3o CNE/CEB n\u00ba 4/2009 \u2013 Diretrizes do AEE",
          "Parecer CNE/CEB n\u00ba 13/2009 \u2013 Operacionaliza\u00e7\u00e3o do AEE",
          "Lei 13.146/2015 (LBI) \u2013 Estatuto da Pessoa com Defici\u00eancia",
        ],
      },
      equipe_multi: {
        titulo: "Base Legal \u2013 Equipe Multidisciplinar",
        normas: [
          "Lei 13.935/2019 \u2013 Psic\u00f3logos e Assistentes Sociais nas escolas",
          "Resolu\u00e7\u00e3o CNE/CP n\u00ba 1/2020 \u2013 BNC-Forma\u00e7\u00e3o",
          "LDB 9.394/96, Art. 62 \u2013 Forma\u00e7\u00e3o de profissionais",
          "Parecer CNE/CEB n\u00ba 17/2001 \u2013 Educa\u00e7\u00e3o Especial",
          "Lei 14.254/2021 \u2013 Acompanhamento de alunos com TDAH/dislexia",
        ],
      },
      riga: {
        titulo: "Base Legal \u2013 RIGA (Rede Interinstitucional de Garantia da Aprendizagem)",
        normas: [
          "LDB 9.394/96, Art. 24, V \u2013 Avalia\u00e7\u00e3o cont\u00ednua e cumulativa",
          "LDB 9.394/96, Art. 12, V \u2013 Recupera\u00e7\u00e3o de estudos",
          "Resolu\u00e7\u00e3o CNE/CEB n\u00ba 7/2010 \u2013 Diretrizes do Ensino Fundamental",
          "Parecer CNE/CEB n\u00ba 11/2010 \u2013 Diretrizes EJA",
          "ECA, Art. 53 \u2013 Direito \u00e0 Educa\u00e7\u00e3o",
          "Res. CEE/TO n\u00ba 26/2007 \u2013 Sistema de Ensino do Tocantins",
        ],
      },
      indicadores: {
        titulo: "Base Legal \u2013 Indicadores Educacionais",
        normas: [
          "PNE \u2013 Lei 13.005/2014, Metas 1 a 20",
          "LDB 9.394/96, Art. 9\u00ba, VI \u2013 Avalia\u00e7\u00e3o do rendimento escolar",
          "Decreto 6.094/2007 \u2013 Plano de Metas Compromisso Todos pela Educa\u00e7\u00e3o",
          "Portaria INEP n\u00ba 366/2019 \u2013 Indicadores Educacionais",
          "Resolu\u00e7\u00e3o CNE/CEB n\u00ba 1/2021 \u2013 SAEB e avalia\u00e7\u00f5es externas",
        ],
      },
    };

    function seedRng(s) { return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; }; }

    function generateData() {
      const data = {};
      const rng = seedRng(42);
      Object.values(COMARCAS).flat().forEach((m) => {
        const r = rng;
        data[m] = {
          infraestrutura: {
            escolas_total: Math.floor(r() * 40) + 5,
            escolas_adequadas: Math.floor(r() * 30) + 3,
            laboratorio_info: Math.floor(r() * 80) + 10,
            biblioteca: Math.floor(r() * 90) + 10,
            quadra_esportiva: Math.floor(r() * 70) + 10,
            acessibilidade: Math.floor(r() * 60) + 5,
            internet_banda_larga: Math.floor(r() * 85) + 10,
            agua_potavel: Math.floor(r() * 95) + 5,
            esgoto_sanitario: Math.floor(r() * 80) + 10,
          },
          sala_aee: {
            salas_implantadas: Math.floor(r() * 10) + 1,
            salas_necessarias: Math.floor(r() * 15) + 3,
            alunos_atendidos: Math.floor(r() * 200) + 10,
            alunos_sem_atendimento: Math.floor(r() * 80),
            profissionais_aee: Math.floor(r() * 12) + 1,
            equipamentos_adequados: Math.floor(r() * 80) + 10,
          },
          equipe_multi: {
            psicologos: Math.floor(r() * 5),
            assistentes_sociais: Math.floor(r() * 4),
            fonoaudiologos: Math.floor(r() * 3),
            pedagogos_esp: Math.floor(r() * 6) + 1,
            cobertura_escolas: Math.floor(r() * 70) + 10,
            atendimentos_mes: Math.floor(r() * 300) + 20,
          },
          riga: {
            alunos_com_riga: Math.floor(r() * 500) + 50,
            alunos_total: Math.floor(r() * 2000) + 300,
            rigas_atualizados: Math.floor(r() * 80) + 10,
            rigas_defasados: Math.floor(r() * 40),
            professores_capacitados: Math.floor(r() * 70) + 10,
          },
          indicadores: {
            ideb_ai: (r() * 3 + 3.5).toFixed(1),
            ideb_af: (r() * 3 + 3.0).toFixed(1),
            taxa_aprovacao: (r() * 15 + 80).toFixed(1),
            taxa_reprovacao: (r() * 12 + 2).toFixed(1),
            taxa_abandono: (r() * 8 + 0.5).toFixed(1),
            distorcao_idade_serie: (r() * 25 + 5).toFixed(1),
            matriculas_total: Math.floor(r() * 5000) + 500,
            alfabetizacao_2ano: (r() * 30 + 55).toFixed(1),
          },
        };
      });
      return data;
    }

    const DADOS = generateData();
    const fmt = (n) => Number(n).toLocaleString("pt-BR");

    const thStyle = { textAlign: "center", padding: "8px 6px", color: "#64748b", borderBottom: "1px solid #1e293b", fontWeight: 600, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5 };
    const tdStyle = { textAlign: "center", padding: "8px 6px", color: "#94a3b8", borderBottom: "1px solid #1e293b11", fontFamily: "'JetBrains Mono', monospace", fontSize: 12 };

    // ── Components ────────────────────────────────────────────────────────────
    function StatusBadge({ value, thresholds }) {
      const v = Number(value);
      let bg, text, label;
      if (v >= thresholds[0]) { bg = "#dcfce7"; text = "#166534"; label = "Adequado"; }
      else if (v >= thresholds[1]) { bg = "#fef9c3"; text = "#854d0e"; label = "Aten\u00e7\u00e3o"; }
      else { bg = "#fee2e2"; text = "#991b1b"; label = "Cr\u00edtico"; }
      return React.createElement("span", { style: { background: bg, color: text, padding: "2px 10px", borderRadius: 99, fontSize: 11, fontWeight: 600, letterSpacing: 0.3 } }, label);
    }

    function MiniBar({ value, max = 100, color = "#0ea5e9" }) {
      const w = Math.min((Number(value) / max) * 100, 100);
      return (
        <div style={{ width: "100%", height: 7, background: "#1e293b", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ width: w + "%", height: "100%", background: color, borderRadius: 4, transition: "width 0.6s cubic-bezier(.22,1,.36,1)" }} />
        </div>
      );
    }

    function RadialGauge({ value, max = 100, color, size = 80, label }) {
      const pctVal = Math.min((Number(value) / max) * 100, 100);
      const r = (size - 10) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (pctVal / 100) * circ;
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <svg width={size} height={size} viewBox={"0 0 " + size + " " + size}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={6} />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              transform={"rotate(-90 " + size/2 + " " + size/2 + ")"}
              style={{ transition: "stroke-dashoffset 0.8s cubic-bezier(.22,1,.36,1)" }} />
            <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
              fill="#e2e8f0" fontSize={size * 0.22} fontWeight="700" fontFamily="'JetBrains Mono', monospace">
              {pctVal.toFixed(0)}%
            </text>
          </svg>
          {label && <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 500, textAlign: "center", maxWidth: size + 10 }}>{label}</span>}
        </div>
      );
    }

    function KPICard({ icon, label, value, sub, color, trend }) {
      return (
        <div style={{
          background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)",
          border: "1px solid " + color + "22",
          borderRadius: 14, padding: "16px 18px",
          display: "flex", flexDirection: "column", gap: 6,
          position: "relative", overflow: "hidden", minWidth: 0,
        }}>
          <div style={{ position: "absolute", top: -20, right: -20, width: 70, height: 70, borderRadius: "50%", background: color + "08" }} />
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 18 }}>{icon}</span>
            <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 500, letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</span>
          </div>
          <div style={{ fontSize: 26, fontWeight: 800, color: "#f1f5f9", fontFamily: "'JetBrains Mono', monospace", letterSpacing: -1 }}>
            {value}
          </div>
          {sub && <span style={{ fontSize: 11, color: "#64748b" }}>{sub}</span>}
          {trend !== undefined && (
            <span style={{ fontSize: 11, color: trend >= 0 ? "#34d399" : "#f87171", fontWeight: 600 }}>
              {trend >= 0 ? "\u25B2" : "\u25BC"} {Math.abs(trend)}% vs ano anterior
            </span>
          )}
        </div>
      );
    }

    // ── Category Panels ──────────────────────────────────────────────────────
    function PainelInfraestrutura({ dados, color }) {
      const d = dados.infraestrutura;
      const adequacao = ((d.escolas_adequadas / d.escolas_total) * 100).toFixed(1);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
            <KPICard icon="\u{1F3EB}" label="Total de Escolas" value={d.escolas_total} color={color} />
            <KPICard icon="\u2705" label="Escolas Adequadas" value={d.escolas_adequadas} sub={adequacao + "% do total"} color={color} />
            <KPICard icon="\u{1F4BB}" label="Lab. Inform\u00e1tica" value={d.laboratorio_info + "%"} color={color} />
            <KPICard icon="\u{1F4DA}" label="Biblioteca" value={d.biblioteca + "%"} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b" }}>
            <h4 style={{ margin: "0 0 14px 0", fontSize: 13, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>
              Indicadores de Infraestrutura (%)
            </h4>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {[
                { l: "Quadra Esportiva", v: d.quadra_esportiva },
                { l: "Acessibilidade", v: d.acessibilidade },
                { l: "Internet Banda Larga", v: d.internet_banda_larga },
                { l: "\u00c1gua Pot\u00e1vel", v: d.agua_potavel },
                { l: "Esgoto Sanit\u00e1rio", v: d.esgoto_sanitario },
              ].map((item) => (
                <div key={item.l} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 12, color: "#cbd5e1", width: 150, flexShrink: 0 }}>{item.l}</span>
                  <div style={{ flex: 1 }}><MiniBar value={item.v} color={color} /></div>
                  <span style={{ fontSize: 12, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace", width: 42, textAlign: "right" }}>{item.v}%</span>
                  <StatusBadge value={item.v} thresholds={[80, 50]} />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function PainelSalaAEE({ dados, color }) {
      const d = dados.sala_aee;
      const cobertura = ((d.salas_implantadas / d.salas_necessarias) * 100).toFixed(1);
      const atendPct = ((d.alunos_atendidos / (d.alunos_atendidos + d.alunos_sem_atendimento)) * 100).toFixed(1);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
            <KPICard icon="\u{1F3E0}" label="Salas Implantadas" value={d.salas_implantadas + "/" + d.salas_necessarias} sub={cobertura + "% de cobertura"} color={color} />
            <KPICard icon="\u{1F9D1}\u200D\u{1F393}" label="Alunos Atendidos" value={fmt(d.alunos_atendidos)} sub={d.alunos_sem_atendimento + " sem atendimento"} color={color} />
            <KPICard icon="\u{1F468}\u200D\u{1F3EB}" label="Prof. AEE" value={d.profissionais_aee} color={color} />
            <KPICard icon="\u2699\uFE0F" label="Equip. Adequados" value={d.equipamentos_adequados + "%"} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b", display: "flex", justifyContent: "center", gap: 32, flexWrap: "wrap" }}>
            <RadialGauge value={cobertura} color={color} label="Cobertura de Salas" size={90} />
            <RadialGauge value={atendPct} color={color} label="Alunos Atendidos" size={90} />
            <RadialGauge value={d.equipamentos_adequados} color={color} label="Equipamentos" size={90} />
          </div>
        </div>
      );
    }

    function PainelEquipeMulti({ dados, color }) {
      const d = dados.equipe_multi;
      const total = d.psicologos + d.assistentes_sociais + d.fonoaudiologos + d.pedagogos_esp;
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
            <KPICard icon="\u{1F9E0}" label="Psic\u00f3logos" value={d.psicologos} sub={d.psicologos === 0 ? "\u26A0 Lei 13.935/2019" : ""} color={color} />
            <KPICard icon="\u{1F91D}" label="Assist. Sociais" value={d.assistentes_sociais} sub={d.assistentes_sociais === 0 ? "\u26A0 Lei 13.935/2019" : ""} color={color} />
            <KPICard icon="\u{1F5E3}\uFE0F" label="Fonos" value={d.fonoaudiologos} color={color} />
            <KPICard icon="\u{1F4D6}" label="Pedagogos Esp." value={d.pedagogos_esp} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <h4 style={{ margin: 0, fontSize: 13, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Resumo</h4>
              <span style={{ fontSize: 22, fontWeight: 800, color: "#e2e8f0" }}>{total} profissionais</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ fontSize: 12, color: "#cbd5e1", width: 150 }}>Cobertura nas Escolas</span>
              <div style={{ flex: 1 }}><MiniBar value={d.cobertura_escolas} color={color} /></div>
              <span style={{ fontSize: 12, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace" }}>{d.cobertura_escolas}%</span>
              <StatusBadge value={d.cobertura_escolas} thresholds={[70, 40]} />
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 12, color: "#cbd5e1", width: 150 }}>Atendimentos/m\u00eas</span>
              <span style={{ fontSize: 18, fontWeight: 700, color: color, fontFamily: "'JetBrains Mono', monospace" }}>{fmt(d.atendimentos_mes)}</span>
            </div>
          </div>
        </div>
      );
    }

    function PainelRiga({ dados, color }) {
      const d = dados.riga;
      const cobertura = ((d.alunos_com_riga / d.alunos_total) * 100).toFixed(1);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
            <KPICard icon="\u{1F4DD}" label="Alunos com RIGA" value={fmt(d.alunos_com_riga)} sub={"de " + fmt(d.alunos_total) + " (" + cobertura + "%)"} color={color} />
            <KPICard icon="\u{1F504}" label="RIGAs Atualizados" value={d.rigas_atualizados + "%"} color={color} />
            <KPICard icon="\u26A0\uFE0F" label="RIGAs Defasados" value={d.rigas_defasados} color={color} />
            <KPICard icon="\u{1F393}" label="Prof. Capacitados" value={d.professores_capacitados + "%"} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b", display: "flex", justifyContent: "center", gap: 32, flexWrap: "wrap" }}>
            <RadialGauge value={cobertura} color={color} label="Cobertura RIGA" size={90} />
            <RadialGauge value={d.rigas_atualizados} color={color} label="Atualizados" size={90} />
            <RadialGauge value={d.professores_capacitados} color={color} label="Prof. Capacitados" size={90} />
          </div>
        </div>
      );
    }

    function PainelIndicadores({ dados, color }) {
      const d = dados.indicadores;
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
            <KPICard icon="\u{1F4C8}" label="IDEB \u2013 Anos Iniciais" value={d.ideb_ai} sub="Meta MEC: 6.0" color={color} trend={2.3} />
            <KPICard icon="\u{1F4C9}" label="IDEB \u2013 Anos Finais" value={d.ideb_af} sub="Meta MEC: 5.5" color={color} trend={-0.8} />
            <KPICard icon="\u{1F393}" label="Matr\u00edculas" value={fmt(d.matriculas_total)} color={color} />
            <KPICard icon="\u{1F524}" label="Alfabetiza\u00e7\u00e3o 2\u00ba Ano" value={d.alfabetizacao_2ano + "%"} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b" }}>
            <h4 style={{ margin: "0 0 14px 0", fontSize: 13, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>
              Taxas de Fluxo Escolar
            </h4>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {[
                { l: "Aprova\u00e7\u00e3o", v: d.taxa_aprovacao, th: [85, 70], c: "#34d399" },
                { l: "Reprova\u00e7\u00e3o", v: d.taxa_reprovacao, th: [5, 10], c: "#fbbf24", inv: true },
                { l: "Abandono", v: d.taxa_abandono, th: [2, 5], c: "#f87171", inv: true },
                { l: "Distor\u00e7\u00e3o Idade-S\u00e9rie", v: d.distorcao_idade_serie, th: [10, 20], c: "#a78bfa", inv: true },
              ].map((item) => (
                <div key={item.l} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 12, color: "#cbd5e1", width: 170, flexShrink: 0 }}>{item.l}</span>
                  <div style={{ flex: 1 }}><MiniBar value={item.v} color={item.c} /></div>
                  <span style={{ fontSize: 12, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace", width: 50, textAlign: "right" }}>{item.v}%</span>
                  <StatusBadge value={item.inv ? (100 - Number(item.v)) : item.v} thresholds={item.inv ? [100 - item.th[1], 100 - item.th[0]] : item.th} />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Main ─────────────────────────────────────────────────────────────────
    function PainelEducaMP() {
      const [comarcaSel, setComarcaSel] = useState("__todas__");
      const [municipioSel, setMunicipioSel] = useState("__todos__");
      const [categoriaSel, setCategoriaSel] = useState("infraestrutura");
      const [showLegal, setShowLegal] = useState(false);
      const [searchTerm, setSearchTerm] = useState("");
      const [viewMode, setViewMode] = useState("detalhado");

      const municipiosDisponiveis = useMemo(() => {
        if (comarcaSel === "__todas__") return Object.values(COMARCAS).flat().sort();
        return (COMARCAS[comarcaSel] || []).sort();
      }, [comarcaSel]);

      const municipiosFiltrados = useMemo(() => {
        let list = municipioSel === "__todos__" ? municipiosDisponiveis : [municipioSel];
        if (searchTerm) list = list.filter((m) => m.toLowerCase().includes(searchTerm.toLowerCase()));
        return list;
      }, [municipioSel, municipiosDisponiveis, searchTerm]);

      const dadosAgregados = useMemo(() => {
        if (municipiosFiltrados.length === 1) return DADOS[municipiosFiltrados[0]];
        const agg = {};
        const cat = categoriaSel;
        const keys = Object.keys(DADOS[Object.keys(DADOS)[0]][cat]);
        const numItems = municipiosFiltrados.length || 1;
        agg[cat] = {};
        keys.forEach((k) => {
          const vals = municipiosFiltrados.map((m) => Number(DADOS[m]?.[cat]?.[k] || 0));
          const sum = vals.reduce((a, b) => a + b, 0);
          const sample = DADOS[Object.keys(DADOS)[0]][cat][k];
          if (typeof sample === "string" && sample.includes(".")) {
            agg[cat][k] = (sum / numItems).toFixed(1);
          } else {
            agg[cat][k] = Math.round(sum / numItems);
          }
        });
        return agg;
      }, [municipiosFiltrados, categoriaSel]);

      const catInfo = CATEGORIAS.find((c) => c.id === categoriaSel);
      const legal = BASE_LEGAL[categoriaSel];

      const renderPanel = () => {
        switch (categoriaSel) {
          case "infraestrutura": return <PainelInfraestrutura dados={dadosAgregados} color={catInfo.color} />;
          case "sala_aee": return <PainelSalaAEE dados={dadosAgregados} color={catInfo.color} />;
          case "equipe_multi": return <PainelEquipeMulti dados={dadosAgregados} color={catInfo.color} />;
          case "riga": return <PainelRiga dados={dadosAgregados} color={catInfo.color} />;
          case "indicadores": return <PainelIndicadores dados={dadosAgregados} color={catInfo.color} />;
          default: return null;
        }
      };

      const selectStyle = {
        background: "#0f172a", color: "#e2e8f0", border: "1px solid #334155",
        borderRadius: 8, padding: "8px 12px", fontSize: 13, fontWeight: 500,
        outline: "none", cursor: "pointer", flex: 1, minWidth: 0,
        WebkitAppearance: "auto", MozAppearance: "auto", appearance: "auto",
      };

      return (
        <div style={{
          fontFamily: "'Segoe UI', 'SF Pro Display', -apple-system, sans-serif",
          background: "#020617", color: "#e2e8f0", minHeight: "100vh",
          maxWidth: 1100, margin: "0 auto", padding: "0 16px 40px",
        }}>
          {/* Header */}
          <div style={{ padding: "28px 0 22px", borderBottom: "1px solid #1e293b", marginBottom: 20 }}>
            <h1 style={{ margin: 0, fontSize: 30, fontWeight: 900, fontStyle: "italic", letterSpacing: -0.5, color: "#22d3ee" }}>
              PainelEducaMP
            </h1>
            <p style={{ margin: "6px 0 0", fontSize: 13, color: "#64748b", fontWeight: 500, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
              CAOPIJE &middot; Minist&eacute;rio P&uacute;blico do Tocantins
              <span style={{ color: "#334155" }}>&middot;</span>
              <span style={{ color: "#94a3b8" }}>{municipiosFiltrados.length} munic&iacute;pios</span>
              <span style={{ color: "#334155" }}>&middot;</span>
              <span style={{ color: "#94a3b8" }}>{comarcaSel === "__todas__" ? Object.keys(COMARCAS).length : 1} comarca(s)</span>
            </p>
          </div>

          {/* Mode + Filter Bar */}
          <div style={{
            display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap",
            padding: "12px 0", marginBottom: 14, borderBottom: "1px solid #1e293b",
          }}>
            <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2 }}>Modo</span>
            {["Por Comarca", "Por Munic\u00edpio"].map((mode) => {
              const isComarca = mode === "Por Comarca";
              const active = isComarca ? comarcaSel !== "__todas__" || municipioSel === "__todos__" : municipioSel !== "__todos__";
              return (
                <button key={mode} onClick={() => { if (isComarca) { setMunicipioSel("__todos__"); } }} style={{
                  background: active ? "#22d3ee" : "transparent",
                  color: active ? "#020617" : "#64748b",
                  border: active ? "1px solid #22d3ee" : "1px solid #334155",
                  borderRadius: 6, padding: "5px 14px", fontSize: 12, fontWeight: 700,
                  cursor: "pointer", transition: "all 0.2s",
                }}>
                  {mode}
                </button>
              );
            })}

            <div style={{ width: 1, height: 24, background: "#1e293b", margin: "0 4px" }} />

            <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2 }}>Comarca</span>
            <select style={{ ...selectStyle, flex: "unset", minWidth: 170 }} value={comarcaSel} onChange={(e) => { setComarcaSel(e.target.value); setMunicipioSel("__todos__"); }}>
              <option value="__todas__">Todas as Comarcas</option>
              {Object.keys(COMARCAS).sort().map((c) => <option key={c} value={c}>{c}</option>)}
            </select>

            <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2 }}>Munic&iacute;pio</span>
            <select style={{ ...selectStyle, flex: "unset", minWidth: 180 }} value={municipioSel} onChange={(e) => setMunicipioSel(e.target.value)}>
              <option value="__todos__">Todos ({municipiosDisponiveis.length})</option>
              {municipiosDisponiveis.map((m) => <option key={m} value={m}>{m}</option>)}
            </select>

            <input type="text" placeholder="\u{1F50D} Buscar..." value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
              style={{ ...selectStyle, flex: "unset", width: 140 }} />
          </div>

          {/* Category Tabs */}
          <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 16, scrollbarWidth: "none" }}>
            {CATEGORIAS.map((cat) => {
              const active = categoriaSel === cat.id;
              return (
                <button key={cat.id} onClick={() => setCategoriaSel(cat.id)} style={{
                  background: active ? cat.color + "18" : "transparent",
                  border: active ? "1.5px solid " + cat.color + "55" : "1.5px solid #1e293b",
                  borderRadius: 10, padding: "10px 14px", cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap",
                  transition: "all 0.2s ease", flexShrink: 0,
                }}>
                  <span style={{ fontSize: 16 }}>{cat.icon}</span>
                  <span style={{ fontSize: 12, fontWeight: active ? 700 : 500, color: active ? cat.color : "#94a3b8" }}>
                    {cat.label}
                  </span>
                </button>
              );
            })}
          </div>

          {/* Section Header + View Toggle */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
            <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span>{catInfo.icon}</span>
              <span style={{ color: catInfo.color }}>{catInfo.label}</span>
              {catInfo.fullLabel && <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 400 }}>&mdash; {catInfo.fullLabel}</span>}
              {municipioSel !== "__todos__" && <span style={{ fontSize: 13, color: "#64748b", fontWeight: 400 }}>&middot; {municipioSel}</span>}
            </h2>
            <div style={{ display: "flex", gap: 4 }}>
              {[{ id: "detalhado", label: "Detalhado" }, { id: "comparativo", label: "Comparativo" }].map((v) => (
                <button key={v.id} onClick={() => setViewMode(v.id)} style={{
                  background: viewMode === v.id ? "#1e293b" : "transparent",
                  color: viewMode === v.id ? "#e2e8f0" : "#64748b",
                  border: "1px solid #334155", borderRadius: 6,
                  padding: "4px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer",
                }}>
                  {v.label}
                </button>
              ))}
            </div>
          </div>

          {/* Content */}
          {viewMode === "detalhado" ? renderPanel() : (
            <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b", overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, minWidth: 600 }}>
                <thead>
                  <tr>
                    <th style={{ textAlign: "left", padding: "8px 10px", color: "#64748b", borderBottom: "1px solid #1e293b", fontWeight: 600, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.8 }}>Munic&iacute;pio</th>
                    {categoriaSel === "infraestrutura" && <><th style={thStyle}>Escolas</th><th style={thStyle}>Adequadas %</th><th style={thStyle}>Lab. Info</th><th style={thStyle}>Biblioteca</th><th style={thStyle}>Internet</th></>}
                    {categoriaSel === "sala_aee" && <><th style={thStyle}>Salas</th><th style={thStyle}>Alunos Atend.</th><th style={thStyle}>Sem Atend.</th><th style={thStyle}>Prof. AEE</th></>}
                    {categoriaSel === "equipe_multi" && <><th style={thStyle}>Psic&oacute;logos</th><th style={thStyle}>Assist. Soc.</th><th style={thStyle}>Fonos</th><th style={thStyle}>Cobertura</th></>}
                    {categoriaSel === "riga" && <><th style={thStyle}>Alunos RIGA</th><th style={thStyle}>Total</th><th style={thStyle}>Atualizados</th><th style={thStyle}>Prof. Capac.</th></>}
                    {categoriaSel === "indicadores" && <><th style={thStyle}>IDEB AI</th><th style={thStyle}>IDEB AF</th><th style={thStyle}>Aprova&ccedil;&atilde;o</th><th style={thStyle}>Abandono</th><th style={thStyle}>Matr&iacute;culas</th></>}
                  </tr>
                </thead>
                <tbody>
                  {municipiosFiltrados.slice(0, 30).map((m, i) => {
                    const d = DADOS[m];
                    if (!d) return null;
                    return (
                      <tr key={m} style={{ background: i % 2 === 0 ? "transparent" : "#0c1222" }}>
                        <td style={{ padding: "8px 10px", color: "#e2e8f0", fontWeight: 600, borderBottom: "1px solid #1e293b11" }}>{m}</td>
                        {categoriaSel === "infraestrutura" && <><td style={tdStyle}>{d.infraestrutura.escolas_total}</td><td style={tdStyle}>{((d.infraestrutura.escolas_adequadas / d.infraestrutura.escolas_total) * 100).toFixed(0)}%</td><td style={tdStyle}>{d.infraestrutura.laboratorio_info}%</td><td style={tdStyle}>{d.infraestrutura.biblioteca}%</td><td style={tdStyle}>{d.infraestrutura.internet_banda_larga}%</td></>}
                        {categoriaSel === "sala_aee" && <><td style={tdStyle}>{d.sala_aee.salas_implantadas}/{d.sala_aee.salas_necessarias}</td><td style={tdStyle}>{d.sala_aee.alunos_atendidos}</td><td style={tdStyle}>{d.sala_aee.alunos_sem_atendimento}</td><td style={tdStyle}>{d.sala_aee.profissionais_aee}</td></>}
                        {categoriaSel === "equipe_multi" && <><td style={tdStyle}>{d.equipe_multi.psicologos}</td><td style={tdStyle}>{d.equipe_multi.assistentes_sociais}</td><td style={tdStyle}>{d.equipe_multi.fonoaudiologos}</td><td style={tdStyle}>{d.equipe_multi.cobertura_escolas}%</td></>}
                        {categoriaSel === "riga" && <><td style={tdStyle}>{fmt(d.riga.alunos_com_riga)}</td><td style={tdStyle}>{fmt(d.riga.alunos_total)}</td><td style={tdStyle}>{d.riga.rigas_atualizados}%</td><td style={tdStyle}>{d.riga.professores_capacitados}%</td></>}
                        {categoriaSel === "indicadores" && <><td style={tdStyle}>{d.indicadores.ideb_ai}</td><td style={tdStyle}>{d.indicadores.ideb_af}</td><td style={tdStyle}>{d.indicadores.taxa_aprovacao}%</td><td style={tdStyle}>{d.indicadores.taxa_abandono}%</td><td style={tdStyle}>{fmt(d.indicadores.matriculas_total)}</td></>}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* Legal Base */}
          <div style={{ marginTop: 20 }}>
            <button onClick={() => setShowLegal(!showLegal)} style={{
              width: "100%", background: "linear-gradient(135deg, #0f172a, #1e293b)",
              border: "1px solid #334155", borderRadius: 12, padding: "14px 18px",
              cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 18 }}>{"\u2696\uFE0F"}</span>
                <span style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 700 }}>{legal.titulo}</span>
              </div>
              <span style={{ color: "#64748b", fontSize: 18, transform: showLegal ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.3s" }}>{"\u25BC"}</span>
            </button>
            {showLegal && (
              <div style={{
                background: "#0f172a", border: "1px solid #334155", borderTop: "none",
                borderRadius: "0 0 12px 12px", padding: "16px 18px",
              }}>
                {legal.normas.map((n, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "flex-start", gap: 10,
                    padding: "8px 0", borderBottom: i < legal.normas.length - 1 ? "1px solid #1e293b" : "none",
                  }}>
                    <span style={{ color: catInfo.color, fontSize: 10, marginTop: 3, flexShrink: 0 }}>{"\u25CF"}</span>
                    <span style={{ fontSize: 12, color: "#cbd5e1", lineHeight: 1.5 }}>{n}</span>
                  </div>
                ))}
                <div style={{ marginTop: 12, padding: "10px 12px", background: catInfo.color + "08", borderRadius: 8, border: "1px solid " + catInfo.color + "22" }}>
                  <span style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.6 }}>
                    {"\u{1F4CC}"} A base legal fundamenta a obriga&ccedil;&atilde;o do Poder P&uacute;blico (Art. 205 e 206 da CF/88) em garantir
                    educa&ccedil;&atilde;o de qualidade. O descumprimento pode ensejar A&ccedil;&atilde;o Civil P&uacute;blica (Art. 5&ordm; da Lei 7.347/85)
                    e responsabiliza&ccedil;&atilde;o do gestor (Lei 8.429/92 &ndash; Improbidade Administrativa).
                  </span>
                </div>
              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{ marginTop: 24, padding: "14px 0", borderTop: "1px solid #1e293b", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
            <span style={{ fontSize: 10, color: "#475569" }}>
              PainelEducaMP &middot; CAOPIJE/MPTO &middot; Base: CF/88 &middot; LDB 9.394/96 &middot; PNE 13.005/2014
            </span>
            <span style={{ fontSize: 10, color: "#475569" }}>
              Dados simulados para fins de an&aacute;lise &middot; {municipiosFiltrados.length} munic&iacute;pio(s) &middot; Atualizado: Abril/2026
            </span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PainelEducaMP />);
  </script>
</body>
</html>
