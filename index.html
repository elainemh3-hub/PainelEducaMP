<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PainelEducaMP — CAOPIJE/MPTO</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; font-family: 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    select:focus, input:focus { border-color: #22d3ee !important; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ── Dados ─────────────────────────────────────────────────────────────────
    const COMARCAS = {
      "Palmas": ["Palmas", "Aparecida do Rio Negro", "Lajeado", "Miracema do Tocantins", "Tocantínia"],
      "Araguaína": ["Araguaína", "Babaçulândia", "Filadélfia", "Wanderlândia", "Nova Olinda"],
      "Gurupi": ["Gurupi", "Aliança do Tocantins", "Dueré", "Figueirópolis", "Peixe"],
      "Paraíso do Tocantins": ["Paraíso do Tocantins", "Pugmil", "Barrolândia", "Monte Santo do Tocantins", "Chapada de Areia"],
      "Porto Nacional": ["Porto Nacional", "Brejinho de Nazaré", "Fátima", "Monte do Carmo", "Silvanópolis"],
      "Colinas do Tocantins": ["Colinas do Tocantins", "Bandeirantes do Tocantins", "Presidente Kennedy", "Brasilândia do Tocantins", "Palmeirante"],
      "Dianópolis": ["Dianópolis", "Almas", "Conceição do Tocantins", "Natividade", "Porto Alegre do Tocantins"],
      "Tocantinópolis": ["Tocantinópolis", "Aguiarnópolis", "Itaguatins", "Maurilândia do Tocantins", "Nazaré"],
    };

    const CATEGORIAS = [
      { id: "infraestrutura", label: "Infraestrutura", icon: "🏗️", color: "#0ea5e9" },
      { id: "sala_aee", label: "Sala de AEE", icon: "♿", color: "#8b5cf6" },
      { id: "equipe_multi", label: "Equipe Multidisciplinar", icon: "👥", color: "#10b981" },
      { id: "riga", label: "RIGA", fullLabel: "Rede Interinstitucional de Garantia da Aprendizagem", icon: "📋", color: "#f59e0b" },
      { id: "indicadores", label: "Indicadores Educacionais", icon: "📊", color: "#ef4444" },
    ];

    const BASE_LEGAL = {
      infraestrutura: {
        titulo: "Base Legal – Infraestrutura Escolar",
        normas: [
          "CF/88, Art. 206, VII – Garantia de padrão de qualidade",
          "LDB 9.394/96, Art. 4º, IX – Padrões mínimos de qualidade",
          "PNE – Lei 13.005/2014, Meta 7, Estratégia 7.18",
          "Resolução CNE/CEB nº 4/2010 – Diretrizes Gerais da Ed. Básica",
          "Parecer CNE/CEB nº 8/2010 – Padrões de qualidade",
        ],
      },
      sala_aee: {
        titulo: "Base Legal – Atendimento Educacional Especializado",
        normas: [
          "CF/88, Art. 208, III – Atendimento especializado",
          "LDB 9.394/96, Art. 58-60 – Educação Especial",
          "Decreto 7.611/2011 – Educação Especial e AEE",
          "Resolução CNE/CEB nº 4/2009 – Diretrizes do AEE",
          "Parecer CNE/CEB nº 13/2009 – Operacionalização do AEE",
          "Lei 13.146/2015 (LBI) – Estatuto da Pessoa com Deficiência",
        ],
      },
      equipe_multi: {
        titulo: "Base Legal – Equipe Multidisciplinar",
        normas: [
          "Lei 13.935/2019 – Psicólogos e Assistentes Sociais nas escolas",
          "Resolução CNE/CP nº 1/2020 – BNC-Formação",
          "LDB 9.394/96, Art. 62 – Formação de profissionais",
          "Parecer CNE/CEB nº 17/2001 – Educação Especial",
          "Lei 14.254/2021 – Acompanhamento de alunos com TDAH/dislexia",
        ],
      },
      riga: {
        titulo: "Base Legal – RIGA (Rede Interinstitucional de Garantia da Aprendizagem)",
        normas: [
          "LDB 9.394/96, Art. 24, V – Avaliação contínua e cumulativa",
          "LDB 9.394/96, Art. 12, V – Recuperação de estudos",
          "Resolução CNE/CEB nº 7/2010 – Diretrizes do Ensino Fundamental",
          "Parecer CNE/CEB nº 11/2010 – Diretrizes EJA",
          "ECA, Art. 53 – Direito à Educação",
          "Res. CEE/TO nº 26/2007 – Sistema de Ensino do Tocantins",
        ],
      },
      indicadores: {
        titulo: "Base Legal – Indicadores Educacionais",
        normas: [
          "PNE – Lei 13.005/2014, Metas 1 a 20",
          "LDB 9.394/96, Art. 9º, VI – Avaliação do rendimento escolar",
          "Decreto 6.094/2007 – Plano de Metas Compromisso Todos pela Educação",
          "Portaria INEP nº 366/2019 – Indicadores Educacionais",
          "Resolução CNE/CEB nº 1/2021 – SAEB e avaliações externas",
        ],
      },
    };

    function seedRng(s) { return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; }; }

    function generateData() {
      const data = {};
      const r = seedRng(42);
      Object.values(COMARCAS).flat().forEach((m) => {
        data[m] = {
          infraestrutura: {
            escolas_total: Math.floor(r() * 40) + 5,
            escolas_adequadas: 0,
            laboratorio_info: Math.floor(r() * 80) + 10,
            biblioteca: Math.floor(r() * 90) + 10,
            quadra_esportiva: Math.floor(r() * 70) + 10,
            acessibilidade: Math.floor(r() * 60) + 5,
            internet_banda_larga: Math.floor(r() * 85) + 10,
            agua_potavel: Math.floor(r() * 95) + 5,
            esgoto_sanitario: Math.floor(r() * 80) + 10,
          },
          sala_aee: {
            salas_necessarias: 0,
            salas_implantadas: 0,
            alunos_atendidos: Math.floor(r() * 200) + 10,
            alunos_sem_atendimento: Math.floor(r() * 80),
            profissionais_aee: Math.floor(r() * 12) + 1,
            equipamentos_adequados: Math.floor(r() * 80) + 10,
          },
          equipe_multi: {
            psicologos: Math.floor(r() * 5),
            assistentes_sociais: Math.floor(r() * 4),
            fonoaudiologos: Math.floor(r() * 3),
            pedagogos_esp: Math.floor(r() * 6) + 1,
            cobertura_escolas: Math.floor(r() * 70) + 10,
            atendimentos_mes: Math.floor(r() * 300) + 20,
          },
          riga: {
            alunos_total: 0,
            alunos_com_riga: 0,
            rigas_atualizados: Math.floor(r() * 80) + 10,
            rigas_defasados: Math.floor(r() * 40),
            professores_capacitados: Math.floor(r() * 70) + 10,
          },
          indicadores: {
            ideb_ai: (r() * 3 + 3.5).toFixed(1),
            ideb_af: (r() * 3 + 3.0).toFixed(1),
            taxa_aprovacao: (r() * 15 + 80).toFixed(1),
            taxa_reprovacao: (r() * 12 + 2).toFixed(1),
            taxa_abandono: (r() * 8 + 0.5).toFixed(1),
            distorcao_idade_serie: (r() * 25 + 5).toFixed(1),
            matriculas_total: Math.floor(r() * 5000) + 500,
            alfabetizacao_2ano: (r() * 30 + 55).toFixed(1),
          },
        };
        // Correções de consistência lógica:
        const inf = data[m].infraestrutura;
        inf.escolas_adequadas = Math.min(Math.floor(r() * inf.escolas_total) + 1, inf.escolas_total);
        const aee = data[m].sala_aee;
        aee.salas_necessarias = Math.floor(r() * 12) + 3;
        aee.salas_implantadas = Math.min(Math.floor(r() * aee.salas_necessarias) + 1, aee.salas_necessarias);
        const rg = data[m].riga;
        rg.alunos_total = Math.floor(r() * 2000) + 300;
        rg.alunos_com_riga = Math.min(Math.floor(r() * rg.alunos_total) + 50, rg.alunos_total);
      });
      return data;
    }

    const DADOS = generateData();
    const fmt = (n) => Number(n).toLocaleString("pt-BR");

    const thStyle = { textAlign: "center", padding: "8px 6px", color: "#64748b", borderBottom: "1px solid #1e293b", fontWeight: 600, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5 };
    const tdStyle = { textAlign: "center", padding: "8px 6px", color: "#94a3b8", borderBottom: "1px solid #1e293b", fontFamily: "'JetBrains Mono', monospace", fontSize: 12 };

    // ── Componentes ───────────────────────────────────────────────────────────
    function StatusBadge({ value, thresholds }) {
      const v = Number(value);
      let bg, text, label;
      if (v >= thresholds[0]) { bg = "#dcfce7"; text = "#166534"; label = "Adequado"; }
      else if (v >= thresholds[1]) { bg = "#fef9c3"; text = "#854d0e"; label = "Atenção"; }
      else { bg = "#fee2e2"; text = "#991b1b"; label = "Crítico"; }
      return <span style={{ background: bg, color: text, padding: "2px 10px", borderRadius: 99, fontSize: 11, fontWeight: 600, letterSpacing: 0.3, whiteSpace: "nowrap" }}>{label}</span>;
    }

    function MiniBar({ value, max = 100, color = "#0ea5e9" }) {
      const w = Math.min((Number(value) / max) * 100, 100);
      return (
        <div style={{ width: "100%", height: 7, background: "#1e293b", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ width: w + "%", height: "100%", background: color, borderRadius: 4, transition: "width 0.6s cubic-bezier(.22,1,.36,1)" }} />
        </div>
      );
    }

    function RadialGauge({ value, max = 100, color, size = 90, label }) {
      const pctVal = Math.min((Number(value) / max) * 100, 100);
      const r = (size - 10) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (pctVal / 100) * circ;
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <svg width={size} height={size} viewBox={"0 0 " + size + " " + size}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth="6" />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6"
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              transform={"rotate(-90 " + (size/2) + " " + (size/2) + ")"}
              style={{ transition: "stroke-dashoffset 0.8s cubic-bezier(.22,1,.36,1)" }} />
            <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
              fill="#e2e8f0" fontSize={size * 0.22} fontWeight="700" fontFamily="'JetBrains Mono', monospace">
              {pctVal.toFixed(0)}%
            </text>
          </svg>
          {label && <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 500, textAlign: "center", maxWidth: size + 20 }}>{label}</span>}
        </div>
      );
    }

    function KPICard({ icon, label, value, sub, color, trend }) {
      return (
        <div style={{
          background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)",
          border: "1px solid " + color + "33",
          borderRadius: 14, padding: "16px 18px",
          display: "flex", flexDirection: "column", gap: 6,
          position: "relative", overflow: "hidden", minWidth: 0,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 18, lineHeight: 1 }}>{icon}</span>
            <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</span>
          </div>
          <div style={{ fontSize: 26, fontWeight: 800, color: "#f1f5f9", fontFamily: "'JetBrains Mono', monospace", letterSpacing: -1 }}>
            {value}
          </div>
          {sub ? <span style={{ fontSize: 11, color: "#64748b" }}>{sub}</span> : null}
          {trend !== undefined ? (
            <span style={{ fontSize: 11, color: trend >= 0 ? "#34d399" : "#f87171", fontWeight: 600 }}>
              {trend >= 0 ? "▲" : "▼"} {Math.abs(trend)}% vs ano anterior
            </span>
          ) : null}
        </div>
      );
    }

    // ── Painéis por Categoria ─────────────────────────────────────────────────
    function PainelInfraestrutura({ dados, color }) {
      const d = dados.infraestrutura;
      const adequacao = ((d.escolas_adequadas / d.escolas_total) * 100).toFixed(1);
      const linhas = [
        { l: "Quadra Esportiva", v: d.quadra_esportiva },
        { l: "Acessibilidade", v: d.acessibilidade },
        { l: "Internet Banda Larga", v: d.internet_banda_larga },
        { l: "Água Potável", v: d.agua_potavel },
        { l: "Esgoto Sanitário", v: d.esgoto_sanitario },
      ];
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
            <KPICard icon="🏫" label="Total de Escolas" value={d.escolas_total} color={color} />
            <KPICard icon="✅" label="Escolas Adequadas" value={d.escolas_adequadas} sub={adequacao + "% do total"} color={color} />
            <KPICard icon="💻" label="Lab. Informática" value={d.laboratorio_info + "%"} color={color} />
            <KPICard icon="📚" label="Biblioteca" value={d.biblioteca + "%"} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b" }}>
            <h4 style={{ margin: "0 0 14px 0", fontSize: 13, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>
              Indicadores de Infraestrutura (%)
            </h4>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {linhas.map((item) => (
                <div key={item.l} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 12, color: "#cbd5e1", width: 150, flexShrink: 0 }}>{item.l}</span>
                  <div style={{ flex: 1 }}><MiniBar value={item.v} color={color} /></div>
                  <span style={{ fontSize: 12, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace", width: 42, textAlign: "right" }}>{item.v}%</span>
                  <StatusBadge value={item.v} thresholds={[80, 50]} />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function PainelSalaAEE({ dados, color }) {
      const d = dados.sala_aee;
      const cobertura = ((d.salas_implantadas / d.salas_necessarias) * 100).toFixed(1);
      const atendPct = ((d.alunos_atendidos / (d.alunos_atendidos + d.alunos_sem_atendimento)) * 100).toFixed(1);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
            <KPICard icon="🏠" label="Salas Implantadas" value={d.salas_implantadas + "/" + d.salas_necessarias} sub={cobertura + "% de cobertura"} color={color} />
            <KPICard icon="🧑‍🎓" label="Alunos Atendidos" value={fmt(d.alunos_atendidos)} sub={d.alunos_sem_atendimento + " sem atendimento"} color={color} />
            <KPICard icon="👩‍🏫" label="Prof. AEE" value={d.profissionais_aee} color={color} />
            <KPICard icon="⚙️" label="Equip. Adequados" value={d.equipamentos_adequados + "%"} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b", display: "flex", justifyContent: "center", gap: 32, flexWrap: "wrap" }}>
            <RadialGauge value={cobertura} color={color} label="Cobertura de Salas" />
            <RadialGauge value={atendPct} color={color} label="Alunos Atendidos" />
            <RadialGauge value={d.equipamentos_adequados} color={color} label="Equipamentos" />
          </div>
        </div>
      );
    }

    function PainelEquipeMulti({ dados, color }) {
      const d = dados.equipe_multi;
      const total = d.psicologos + d.assistentes_sociais + d.fonoaudiologos + d.pedagogos_esp;
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
            <KPICard icon="🧠" label="Psicólogos" value={d.psicologos} sub={d.psicologos === 0 ? "⚠ Déficit — Lei 13.935/2019" : ""} color={color} />
            <KPICard icon="🤝" label="Assist. Sociais" value={d.assistentes_sociais} sub={d.assistentes_sociais === 0 ? "⚠ Déficit — Lei 13.935/2019" : ""} color={color} />
            <KPICard icon="🗣️" label="Fonoaudiólogos" value={d.fonoaudiologos} color={color} />
            <KPICard icon="📖" label="Pedagogos Esp." value={d.pedagogos_esp} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
              <h4 style={{ margin: 0, fontSize: 13, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Resumo</h4>
              <span style={{ fontSize: 20, fontWeight: 800, color: "#e2e8f0" }}>{total} profissionais</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ fontSize: 12, color: "#cbd5e1", width: 150, flexShrink: 0 }}>Cobertura nas Escolas</span>
              <div style={{ flex: 1 }}><MiniBar value={d.cobertura_escolas} color={color} /></div>
              <span style={{ fontSize: 12, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace" }}>{d.cobertura_escolas}%</span>
              <StatusBadge value={d.cobertura_escolas} thresholds={[70, 40]} />
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 12, color: "#cbd5e1", width: 150, flexShrink: 0 }}>Atendimentos/mês</span>
              <span style={{ fontSize: 18, fontWeight: 700, color: color, fontFamily: "'JetBrains Mono', monospace" }}>{fmt(d.atendimentos_mes)}</span>
            </div>
          </div>
        </div>
      );
    }

    function PainelRiga({ dados, color }) {
      const d = dados.riga;
      const cobertura = ((d.alunos_com_riga / d.alunos_total) * 100).toFixed(1);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
            <KPICard icon="📝" label="Alunos com RIGA" value={fmt(d.alunos_com_riga)} sub={"de " + fmt(d.alunos_total) + " (" + cobertura + "%)"} color={color} />
            <KPICard icon="🔄" label="RIGAs Atualizados" value={d.rigas_atualizados + "%"} color={color} />
            <KPICard icon="⚠️" label="RIGAs Defasados" value={d.rigas_defasados} color={color} />
            <KPICard icon="🎓" label="Prof. Capacitados" value={d.professores_capacitados + "%"} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b", display: "flex", justifyContent: "center", gap: 32, flexWrap: "wrap" }}>
            <RadialGauge value={cobertura} color={color} label="Cobertura RIGA" />
            <RadialGauge value={d.rigas_atualizados} color={color} label="Atualizados" />
            <RadialGauge value={d.professores_capacitados} color={color} label="Prof. Capacitados" />
          </div>
        </div>
      );
    }

    function PainelIndicadores({ dados, color }) {
      const d = dados.indicadores;
      const linhas = [
        { l: "Aprovação", v: d.taxa_aprovacao, th: [85, 70], c: "#34d399" },
        { l: "Reprovação", v: d.taxa_reprovacao, th: [5, 10], c: "#fbbf24", inv: true },
        { l: "Abandono", v: d.taxa_abandono, th: [2, 5], c: "#f87171", inv: true },
        { l: "Distorção Idade-Série", v: d.distorcao_idade_serie, th: [10, 20], c: "#a78bfa", inv: true },
      ];
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
            <KPICard icon="📈" label="IDEB – Anos Iniciais" value={d.ideb_ai} sub="Meta MEC: 6.0" color={color} />
            <KPICard icon="📉" label="IDEB – Anos Finais" value={d.ideb_af} sub="Meta MEC: 5.5" color={color} />
            <KPICard icon="🎓" label="Matrículas" value={fmt(d.matriculas_total)} color={color} />
            <KPICard icon="🔤" label="Alfabetização 2º Ano" value={d.alfabetizacao_2ano + "%"} color={color} />
          </div>
          <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b" }}>
            <h4 style={{ margin: "0 0 14px 0", fontSize: 13, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>
              Taxas de Fluxo Escolar
            </h4>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {linhas.map((item) => (
                <div key={item.l} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 12, color: "#cbd5e1", width: 170, flexShrink: 0 }}>{item.l}</span>
                  <div style={{ flex: 1 }}><MiniBar value={item.v} color={item.c} /></div>
                  <span style={{ fontSize: 12, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace", width: 50, textAlign: "right" }}>{item.v}%</span>
                  <StatusBadge value={item.inv ? (100 - Number(item.v)) : item.v} thresholds={item.inv ? [100 - item.th[1], 100 - item.th[0]] : item.th} />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Painel Principal ──────────────────────────────────────────────────────
    function PainelEducaMP() {
      const [comarcaSel, setComarcaSel] = useState("__todas__");
      const [municipioSel, setMunicipioSel] = useState("__todos__");
      const [categoriaSel, setCategoriaSel] = useState("infraestrutura");
      const [showLegal, setShowLegal] = useState(false);
      const [searchTerm, setSearchTerm] = useState("");
      const [viewMode, setViewMode] = useState("detalhado");

      const municipiosDisponiveis = useMemo(() => {
        if (comarcaSel === "__todas__") return Object.values(COMARCAS).flat().sort((a, b) => a.localeCompare(b, "pt-BR"));
        return (COMARCAS[comarcaSel] || []).slice().sort((a, b) => a.localeCompare(b, "pt-BR"));
      }, [comarcaSel]);

      const municipiosFiltrados = useMemo(() => {
        let list = municipioSel === "__todos__" ? municipiosDisponiveis : [municipioSel];
        if (searchTerm.trim()) list = list.filter((m) => m.toLowerCase().includes(searchTerm.trim().toLowerCase()));
        return list;
      }, [municipioSel, municipiosDisponiveis, searchTerm]);

      const dadosAgregados = useMemo(() => {
        if (municipiosFiltrados.length === 0) return null;
        if (municipiosFiltrados.length === 1) return DADOS[municipiosFiltrados[0]];
        const primeiro = DADOS[municipiosFiltrados[0]];
        const agg = {};
        const cat = categoriaSel;
        const keys = Object.keys(primeiro[cat]);
        const n = municipiosFiltrados.length;
        agg[cat] = {};
        keys.forEach((k) => {
          const soma = municipiosFiltrados.reduce((acc, m) => acc + Number(DADOS[m][cat][k] || 0), 0);
          const amostra = primeiro[cat][k];
          // Valores absolutos (contagens) são SOMADOS; percentuais e taxas são MÉDIA
          const camposSomados = ["escolas_total", "escolas_adequadas", "salas_implantadas", "salas_necessarias",
            "alunos_atendidos", "alunos_sem_atendimento", "profissionais_aee", "psicologos", "assistentes_sociais",
            "fonoaudiologos", "pedagogos_esp", "atendimentos_mes", "alunos_com_riga", "alunos_total",
            "rigas_defasados", "matriculas_total"];
          if (camposSomados.includes(k)) {
            agg[cat][k] = soma;
          } else if (typeof amostra === "string") {
            agg[cat][k] = (soma / n).toFixed(1);
          } else {
            agg[cat][k] = Math.round(soma / n);
          }
        });
        return agg;
      }, [municipiosFiltrados, categoriaSel]);

      const catInfo = CATEGORIAS.find((c) => c.id === categoriaSel);
      const legal = BASE_LEGAL[categoriaSel];
      const modoAtual = municipioSel !== "__todos__" ? "municipio" : "comarca";

      const renderPanel = () => {
        if (!dadosAgregados) {
          return (
            <div style={{ background: "#0f172a", borderRadius: 12, padding: 40, border: "1px solid #1e293b", textAlign: "center", color: "#64748b", fontSize: 14 }}>
              Nenhum município encontrado com os filtros atuais.
            </div>
          );
        }
        switch (categoriaSel) {
          case "infraestrutura": return <PainelInfraestrutura dados={dadosAgregados} color={catInfo.color} />;
          case "sala_aee": return <PainelSalaAEE dados={dadosAgregados} color={catInfo.color} />;
          case "equipe_multi": return <PainelEquipeMulti dados={dadosAgregados} color={catInfo.color} />;
          case "riga": return <PainelRiga dados={dadosAgregados} color={catInfo.color} />;
          case "indicadores": return <PainelIndicadores dados={dadosAgregados} color={catInfo.color} />;
          default: return null;
        }
      };

      const selectStyle = {
        background: "#0f172a", color: "#e2e8f0", border: "1px solid #334155",
        borderRadius: 8, padding: "8px 12px", fontSize: 13, fontWeight: 500,
        cursor: "pointer",
      };

      return (
        <div style={{
          fontFamily: "'Segoe UI', 'SF Pro Display', -apple-system, sans-serif",
          background: "#020617", color: "#e2e8f0", minHeight: "100vh",
          maxWidth: 1100, margin: "0 auto", padding: "0 16px 40px",
        }}>
          {/* Cabeçalho */}
          <div style={{ padding: "28px 0 22px", borderBottom: "1px solid #1e293b", marginBottom: 16 }}>
            <h1 style={{ margin: 0, fontSize: 30, fontWeight: 900, fontStyle: "italic", letterSpacing: -0.5, color: "#22d3ee" }}>
              PainelEducaMP
            </h1>
            <p style={{ margin: "6px 0 0", fontSize: 13, color: "#64748b", fontWeight: 500 }}>
              CAOPIJE · Ministério Público do Tocantins
              <span style={{ color: "#334155" }}> · </span>
              <span style={{ color: "#94a3b8" }}>{municipiosFiltrados.length} município(s)</span>
              <span style={{ color: "#334155" }}> · </span>
              <span style={{ color: "#94a3b8" }}>{comarcaSel === "__todas__" ? Object.keys(COMARCAS).length + " comarcas" : "Comarca de " + comarcaSel}</span>
            </p>
          </div>

          {/* Barra de Modo + Filtros */}
          <div style={{
            display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap",
            padding: "12px 0", marginBottom: 14, borderBottom: "1px solid #1e293b",
          }}>
            <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2 }}>Modo</span>
            <button onClick={() => setMunicipioSel("__todos__")} style={{
              background: modoAtual === "comarca" ? "#22d3ee" : "transparent",
              color: modoAtual === "comarca" ? "#020617" : "#64748b",
              border: modoAtual === "comarca" ? "1px solid #22d3ee" : "1px solid #334155",
              borderRadius: 6, padding: "5px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer",
            }}>
              Por Comarca
            </button>
            <button onClick={() => { if (municipiosDisponiveis.length > 0) setMunicipioSel(municipiosDisponiveis[0]); }} style={{
              background: modoAtual === "municipio" ? "#22d3ee" : "transparent",
              color: modoAtual === "municipio" ? "#020617" : "#64748b",
              border: modoAtual === "municipio" ? "1px solid #22d3ee" : "1px solid #334155",
              borderRadius: 6, padding: "5px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer",
            }}>
              Por Município
            </button>

            <div style={{ width: 1, height: 24, background: "#334155" }} />

            <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2 }}>Comarca</span>
            <select style={{ ...selectStyle, minWidth: 170 }} value={comarcaSel} onChange={(e) => { setComarcaSel(e.target.value); setMunicipioSel("__todos__"); }}>
              <option value="__todas__">Todas as Comarcas</option>
              {Object.keys(COMARCAS).sort().map((c) => <option key={c} value={c}>{c}</option>)}
            </select>

            <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.2 }}>Município</span>
            <select style={{ ...selectStyle, minWidth: 180 }} value={municipioSel} onChange={(e) => setMunicipioSel(e.target.value)}>
              <option value="__todos__">Todos ({municipiosDisponiveis.length})</option>
              {municipiosDisponiveis.map((m) => <option key={m} value={m}>{m}</option>)}
            </select>

            <input type="text" placeholder="Buscar município..." value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
              style={{ ...selectStyle, cursor: "text", width: 160 }} />
          </div>

          {/* Abas de Categoria */}
          <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 16 }}>
            {CATEGORIAS.map((cat) => {
              const active = categoriaSel === cat.id;
              return (
                <button key={cat.id} onClick={() => setCategoriaSel(cat.id)} style={{
                  background: active ? cat.color + "18" : "transparent",
                  border: active ? "1.5px solid " + cat.color + "55" : "1.5px solid #1e293b",
                  borderRadius: 10, padding: "10px 14px", cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap", flexShrink: 0,
                }}>
                  <span style={{ fontSize: 16 }}>{cat.icon}</span>
                  <span style={{ fontSize: 12, fontWeight: active ? 700 : 500, color: active ? cat.color : "#94a3b8" }}>
                    {cat.label}
                  </span>
                </button>
              );
            })}
          </div>

          {/* Título da Seção + Alternador de Visão */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
            <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span>{catInfo.icon}</span>
              <span style={{ color: catInfo.color }}>{catInfo.label}</span>
              {catInfo.fullLabel ? <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 400 }}>— {catInfo.fullLabel}</span> : null}
              {municipioSel !== "__todos__" ? <span style={{ fontSize: 13, color: "#64748b", fontWeight: 400 }}>· {municipioSel}</span> : null}
            </h2>
            <div style={{ display: "flex", gap: 4 }}>
              <button onClick={() => setViewMode("detalhado")} style={{
                background: viewMode === "detalhado" ? "#1e293b" : "transparent",
                color: viewMode === "detalhado" ? "#e2e8f0" : "#64748b",
                border: "1px solid #334155", borderRadius: 6,
                padding: "4px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer",
              }}>
                Detalhado
              </button>
              <button onClick={() => setViewMode("comparativo")} style={{
                background: viewMode === "comparativo" ? "#1e293b" : "transparent",
                color: viewMode === "comparativo" ? "#e2e8f0" : "#64748b",
                border: "1px solid #334155", borderRadius: 6,
                padding: "4px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer",
              }}>
                Comparativo
              </button>
            </div>
          </div>

          {/* Conteúdo */}
          {viewMode === "detalhado" ? renderPanel() : (
            <div style={{ background: "#0f172a", borderRadius: 12, padding: 16, border: "1px solid #1e293b", overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, minWidth: 620 }}>
                <thead>
                  <tr>
                    <th style={{ ...thStyle, textAlign: "left", padding: "8px 10px" }}>Município</th>
                    {categoriaSel === "infraestrutura" ? [
                      <th key="1" style={thStyle}>Escolas</th>,
                      <th key="2" style={thStyle}>Adequadas %</th>,
                      <th key="3" style={thStyle}>Lab. Info</th>,
                      <th key="4" style={thStyle}>Biblioteca</th>,
                      <th key="5" style={thStyle}>Internet</th>
                    ] : null}
                    {categoriaSel === "sala_aee" ? [
                      <th key="1" style={thStyle}>Salas</th>,
                      <th key="2" style={thStyle}>Alunos Atend.</th>,
                      <th key="3" style={thStyle}>Sem Atend.</th>,
                      <th key="4" style={thStyle}>Prof. AEE</th>
                    ] : null}
                    {categoriaSel === "equipe_multi" ? [
                      <th key="1" style={thStyle}>Psicólogos</th>,
                      <th key="2" style={thStyle}>Assist. Soc.</th>,
                      <th key="3" style={thStyle}>Fonos</th>,
                      <th key="4" style={thStyle}>Cobertura</th>
                    ] : null}
                    {categoriaSel === "riga" ? [
                      <th key="1" style={thStyle}>Alunos RIGA</th>,
                      <th key="2" style={thStyle}>Total</th>,
                      <th key="3" style={thStyle}>Atualizados</th>,
                      <th key="4" style={thStyle}>Prof. Capac.</th>
                    ] : null}
                    {categoriaSel === "indicadores" ? [
                      <th key="1" style={thStyle}>IDEB AI</th>,
                      <th key="2" style={thStyle}>IDEB AF</th>,
                      <th key="3" style={thStyle}>Aprovação</th>,
                      <th key="4" style={thStyle}>Abandono</th>,
                      <th key="5" style={thStyle}>Matrículas</th>
                    ] : null}
                  </tr>
                </thead>
                <tbody>
                  {municipiosFiltrados.map((m, i) => {
                    const d = DADOS[m];
                    if (!d) return null;
                    return (
                      <tr key={m} style={{ background: i % 2 === 0 ? "transparent" : "#0c1222" }}>
                        <td style={{ padding: "8px 10px", color: "#e2e8f0", fontWeight: 600, borderBottom: "1px solid #1e293b" }}>{m}</td>
                        {categoriaSel === "infraestrutura" ? [
                          <td key="1" style={tdStyle}>{d.infraestrutura.escolas_total}</td>,
                          <td key="2" style={tdStyle}>{((d.infraestrutura.escolas_adequadas / d.infraestrutura.escolas_total) * 100).toFixed(0)}%</td>,
                          <td key="3" style={tdStyle}>{d.infraestrutura.laboratorio_info}%</td>,
                          <td key="4" style={tdStyle}>{d.infraestrutura.biblioteca}%</td>,
                          <td key="5" style={tdStyle}>{d.infraestrutura.internet_banda_larga}%</td>
                        ] : null}
                        {categoriaSel === "sala_aee" ? [
                          <td key="1" style={tdStyle}>{d.sala_aee.salas_implantadas}/{d.sala_aee.salas_necessarias}</td>,
                          <td key="2" style={tdStyle}>{d.sala_aee.alunos_atendidos}</td>,
                          <td key="3" style={tdStyle}>{d.sala_aee.alunos_sem_atendimento}</td>,
                          <td key="4" style={tdStyle}>{d.sala_aee.profissionais_aee}</td>
                        ] : null}
                        {categoriaSel === "equipe_multi" ? [
                          <td key="1" style={tdStyle}>{d.equipe_multi.psicologos}</td>,
                          <td key="2" style={tdStyle}>{d.equipe_multi.assistentes_sociais}</td>,
                          <td key="3" style={tdStyle}>{d.equipe_multi.fonoaudiologos}</td>,
                          <td key="4" style={tdStyle}>{d.equipe_multi.cobertura_escolas}%</td>
                        ] : null}
                        {categoriaSel === "riga" ? [
                          <td key="1" style={tdStyle}>{fmt(d.riga.alunos_com_riga)}</td>,
                          <td key="2" style={tdStyle}>{fmt(d.riga.alunos_total)}</td>,
                          <td key="3" style={tdStyle}>{d.riga.rigas_atualizados}%</td>,
                          <td key="4" style={tdStyle}>{d.riga.professores_capacitados}%</td>
                        ] : null}
                        {categoriaSel === "indicadores" ? [
                          <td key="1" style={tdStyle}>{d.indicadores.ideb_ai}</td>,
                          <td key="2" style={tdStyle}>{d.indicadores.ideb_af}</td>,
                          <td key="3" style={tdStyle}>{d.indicadores.taxa_aprovacao}%</td>,
                          <td key="4" style={tdStyle}>{d.indicadores.taxa_abandono}%</td>,
                          <td key="5" style={tdStyle}>{fmt(d.indicadores.matriculas_total)}</td>
                        ] : null}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* Base Legal */}
          <div style={{ marginTop: 20 }}>
            <button onClick={() => setShowLegal(!showLegal)} style={{
              width: "100%", background: "linear-gradient(135deg, #0f172a, #1e293b)",
              border: "1px solid #334155", borderRadius: showLegal ? "12px 12px 0 0" : 12, padding: "14px 18px",
              cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 18 }}>⚖️</span>
                <span style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 700, textAlign: "left" }}>{legal.titulo}</span>
              </div>
              <span style={{ color: "#64748b", fontSize: 14, transform: showLegal ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.3s" }}>▼</span>
            </button>
            {showLegal ? (
              <div style={{
                background: "#0f172a", border: "1px solid #334155", borderTop: "none",
                borderRadius: "0 0 12px 12px", padding: "16px 18px",
              }}>
                {legal.normas.map((norma, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "flex-start", gap: 10,
                    padding: "8px 0", borderBottom: i < legal.normas.length - 1 ? "1px solid #1e293b" : "none",
                  }}>
                    <span style={{ color: catInfo.color, fontSize: 10, marginTop: 3, flexShrink: 0 }}>●</span>
                    <span style={{ fontSize: 12, color: "#cbd5e1", lineHeight: 1.5 }}>{norma}</span>
                  </div>
                ))}
                <div style={{ marginTop: 12, padding: "10px 12px", background: catInfo.color + "0d", borderRadius: 8, border: "1px solid " + catInfo.color + "33" }}>
                  <span style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.6 }}>
                    📌 A base legal fundamenta a obrigação do Poder Público (Arts. 205 e 206 da CF/88) em garantir
                    educação de qualidade. O descumprimento pode ensejar Ação Civil Pública (Art. 5º da Lei 7.347/85)
                    e responsabilização do gestor (Lei 8.429/92 – Improbidade Administrativa).
                  </span>
                </div>
              </div>
            ) : null}
          </div>

          {/* Rodapé */}
          <div style={{ marginTop: 24, padding: "14px 0", borderTop: "1px solid #1e293b", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
            <span style={{ fontSize: 10, color: "#475569" }}>
              PainelEducaMP · CAOPIJE/MPTO · Base: CF/88 · LDB 9.394/96 · PNE 13.005/2014
            </span>
            <span style={{ fontSize: 10, color: "#475569" }}>
              Dados simulados para fins de análise · {municipiosFiltrados.length} município(s) · Atualizado: Julho/2026
            </span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PainelEducaMP />);
  </script>
</body>
</html>
